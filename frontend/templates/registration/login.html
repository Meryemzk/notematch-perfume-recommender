{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container nm-section" style="max-width:620px;">
  <div class="nm-card nm-form-card">
    <p class="nm-kicker mb-1">Welcome back</p>
    <h2 class="nm-title mb-3">Login to NoteMatch</h2>
    {% if form.errors %}<div class="alert alert-danger">Your username or password is incorrect. Please try again.</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="id_username">Username</label>
        <input class="form-control" type="text" name="username" autofocus autocapitalize="none" autocomplete="username" required id="id_username">
      </div>
      <div class="mb-3">
        <label class="form-label" for="id_password">Password</label>
        <input class="form-control" type="password" name="password" autocomplete="current-password" required id="id_password">
      </div>
      <button class="btn nm-btn w-100" type="submit">Login</button>
    </form>
    <p class="text-center text-secondary mt-3 mb-0">New to NoteMatch? <a href="/users/signup/">Create account</a></p>
  </div>
</div>
{% endblock %}
