{% extends "base.html" %}
{% block title %}Sign up{% endblock %}

{% block content %}
<div class="container nm-section" style="max-width:520px;">
  <div class="nm-card">
    <h2 class="nm-title mb-3">Create account</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn nm-btn" type="submit">Sign up</button>
    </form>

    <p class="mt-3 mb-0 text-secondary">
      Already have an account? <a href="/accounts/login/">Login</a>
    </p>
  </div>
</div>
{% endblock %}
