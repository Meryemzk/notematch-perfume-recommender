{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container nm-section" style="max-width:520px;">
  <div class="nm-card">
    <h2 class="nm-title mb-3">Login</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn nm-btn" type="submit">Login</button>
    </form>

    <p class="mt-3 mb-0 text-secondary">
      No account? <a href="/users/signup/">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
