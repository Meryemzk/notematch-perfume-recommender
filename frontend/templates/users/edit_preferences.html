{% extends "base.html" %}
{% block title %}Edit Preferences{% endblock %}

{% block content %}
<div class="container nm-section" style="max-width:900px;">
  <div class="nm-card">
    <p class="nm-eyebrow">Saved preferences</p>
    <h2 class="nm-title mb-3">Edit your saved perfume profile</h2>
    <p class="text-secondary">These values stay saved for your account until you update them again.</p>

    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Favourite perfume 1</label><input class="form-control" name="favourite_perfume_1" value="{{ saved_profile.favourite_perfume_1|default:'' }}" required></div>
        <div class="col-md-4"><label class="form-label">Favourite perfume 2</label><input class="form-control" name="favourite_perfume_2" value="{{ saved_profile.favourite_perfume_2|default:'' }}" required></div>
        <div class="col-md-4"><label class="form-label">Favourite perfume 3</label><input class="form-control" name="favourite_perfume_3" value="{{ saved_profile.favourite_perfume_3|default:'' }}" required></div>
      </div>
      <div class="row g-3 mt-2">
        <div class="col-md-4"><label class="form-label">Preferred gender</label><select class="form-select" name="preferred_gender">{% for value,label in choices.gender %}<option value="{{ value }}" {% if saved_profile.preferred_gender == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Style</label><select class="form-select" name="style_preference">{% for value,label in choices.style %}<option value="{{ value }}" {% if saved_profile.style_preference == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
        <div class="col-md-4"><label class="form-label">Budget</label><select class="form-select" name="budget_range">{% for value,label in choices.budget %}<option value="{{ value }}" {% if saved_profile.budget_range == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
      </div>
      <div class="mt-4 d-flex gap-2 flex-wrap">
        <button class="btn nm-btn" type="submit">Save profile</button>
        <a class="btn nm-pill" href="/users/me/">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
